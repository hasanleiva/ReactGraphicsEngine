server {
    listen 80;
    server_name yourdomain.com;

    # Redirect HTTP to HTTPS (uncomment after running Certbot)
    # return 301 https://$host$request_uri;

    # Serve the React Vite build output
    root /home/user/React-Canva-editor-srcfold/dist;
    index index.html;

    # Proxy API, font search, and font file requests to Express
    location ~ ^/(api|search-fonts|fonts)/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;

        # Allow file uploads up to 10 MB
        client_max_body_size 10M;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # SPA fallback - all frontend routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets (JS/CSS/fonts/images in dist/)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}

# HTTPS server block - run: certbot --nginx -d yourdomain.com
# Certbot will auto-populate this block
